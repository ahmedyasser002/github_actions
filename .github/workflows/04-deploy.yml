# This workflow completes the story by delivering the saved package.
# It starts after the build workflow finishes successfully.
name: 04 Deploy Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  IMAGE_NAME: tiny-health-app
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

permissions:
  # Read access is enough because this workflow only downloads artifacts and reads repo data.
  actions: read
  contents: read

jobs:
  deploy-package:
    # Continue only when the build workflow succeeded.
    if: github.event.pull_request.merged == true

    # Use a fresh runner for the deployment simulation.
    runs-on: ubuntu-latest

    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Pull image from ECR
        run: |
          docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
      - name: Start container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest"

      - name: Smoke test deployed app
        # Retry a few times because app startup can take a moment.
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${APP_PORT}/health"; then
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Validate Container Is Running
        run: docker ps

      - name: Check health endpoint
        run: curl http://localhost:8000/health

      - name: Stop container
        if: always()
        # Clean up even if an earlier step fails.
        run: docker rm -f "${CONTAINER_NAME}" || true
