# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow


on:
  # Run automatically when app code, tests, or this workflow file changes.
  # push:
  #   paths:
  #     - "app/**"
  #     - "tests/**"
  #     - ".github/workflows/02-ci.yml"

  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize


  # schedule:
  #   # Runs at 00:00 UTC every day
  #   - cron: '0 10 * * *'
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:
  
# env:
#   PYTHON_VERSION: ${{ secrets.PYTHON_VERSION }}
jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
          # os: [ubuntu-latest, macos-latest]
          os: [ubuntu-latest]
          
          version: ["3.11" , "3.12"]

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Validate checkout
        run: ls -a

      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          # trivy-config: trivy.yaml
    
      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.version }}

      - name: Validate Python is installed
        run: python --version


      - name: Lint with Ruff     
        run: |
          pip install ruff
          ruff check ./app/

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      
      - name: Get current time
        run: echo "NOW=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
        # NOW = "2026-06-27 10:00:00"

      - name: Print current time
        run: echo "The current time is ${{ env.NOW }}"

        # Step 1: Scan the raw Dockerfile for misconfigurations/secrets
      - name: Run Trivy vulnerability scanner (Config Mode)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          hide-progress: true
          exit-code: '1' # Fail pipeline if misconfigurations are found
          severity: 'CRITICAL,HIGH'

      - name: Build an image from Dockerfile
        run: docker build -t docker.io/ahmedyasser02/my-app:${{ github.sha }} .
    
      # Save Docker image to a tar file and upload as artifact
      - name: Save Docker image as tar
        run: docker save docker.io/ahmedyasser02/my-app:${{ github.sha }} -o my-app.tar


      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.version }}
          path: my-app.tar
          retention-days: 7

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'docker.io/ahmedyasser02/my-app:${{ github.sha }}'
          format: 'json'                        
          output: 'trivy-image-report.json'    
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Upload Trivy scan report as artifact
      - name: Upload Trivy scan report artifact
        if: always()     
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.version }}
          path: trivy-image-report.json
          retention-days: 7
      # push the image to ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        run: |
          docker tag docker.io/ahmedyasser02/my-app:${{ github.sha }} \
            ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}


